# v5_pulse.ini
#
# Cold-staged Pulse / StepDir LinuxCNC target based on the new-vivado
# z20_v1_5 step_ip ABI. This template is not a board hardware closure.
# Runtime selection stays fail-closed until the read-only step_ip probe,
# production HAL/RT adapter, device-tree/UIO, and board safety evidence pass.

[EMC]
MACHINE = v5-pulse-step-ip-v1_5
DEBUG = 0
VERSION = 1.1
NML_FILE = /usr/share/linuxcnc/linuxcnc.nml

[DISPLAY]
DISPLAY = linuxcncrsh --port 5007 --name V5_LINUXCNCRSH --connectpw EMC --enablepw EMCTOO --path /opt/8ax/v5/linuxcnc/nc
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.2
MIN_SPINDLE_OVERRIDE = 0.5
MAX_SPINDLE_OVERRIDE = 1.2
DEFAULT_LINEAR_VELOCITY = 36
MAX_LINEAR_VELOCITY = 166.666667
DEFAULT_ANGULAR_VELOCITY = 833.333333333
MAX_ANGULAR_VELOCITY = 833.333333333
PROGRAM_PREFIX = /opt/8ax/v5/linuxcnc/nc
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
T0_TOOL_HOLDER_LENGTH_MM = 15

[KINS]
JOINTS = 6
KINEMATICS = trivkins coordinates=xyzabc

[FILTER]
PROGRAM_EXTENSION = .nc,.tap G-Code File
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = /opt/8ax/v5/linuxcnc/var/linuxcnc.var
SUBROUTINE_PATH = /opt/8ax/v5/linuxcnc/remap_subs:/usr/share/linuxcnc/ncfiles
USER_M_PATH = /opt/8ax/v5/linuxcnc/nc
HAL_PIN_VARS = 1
RS274NGC_STARTUP_CODE = G21 G17 G40 G49 G54 G64 G80 G90 G94

[EMCMOT]
TPMOD = tpmod
EMCMOT = motmod
COMM_TIMEOUT = 60.0
BASE_PERIOD = 100000
SERVO_PERIOD = 4500000

[HAL]
HALFILE = /opt/8ax/v5/linuxcnc/hal/v5_pulse.hal

[TRAJ]
COORDINATES = X Y Z A B C
AXES = 6
SPINDLES = 1
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_VELOCITY = 1
MAX_VELOCITY = 166.666667
MAX_LINEAR_VELOCITY = 166.666667
DEFAULT_ACCELERATION = 100
MAX_ACCELERATION = 500
DEFAULT_LINEAR_ACCELERATION = 100
MAX_LINEAR_ACCELERATION = 500
POSITION_FILE = /opt/8ax/v5/linuxcnc/var/position.txt

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = /opt/8ax/v5/linuxcnc/var/tool.tbl

[AXIS_X]
TYPE = LINEAR
DIRECTION_MODE = cw
MAX_VELOCITY = 166.666667
MAX_ACCELERATION = 500
MIN_LIMIT = -500
MAX_LIMIT = 500
PITCH = 5
MOTOR_REV = 1
LOAD_REV = 1
BACKLASH = 0

[JOINT_0]
TYPE = LINEAR
HOME = 0
MIN_LIMIT = -500
MAX_LIMIT = 500
MAX_VELOCITY = 166.666667
MAX_ACCELERATION = 500
STEPGEN_MAXACCEL = 625
SCALE = 10000
FERROR = 1000
