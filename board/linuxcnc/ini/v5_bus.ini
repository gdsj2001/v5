# v5_bus.ini
# BUS/EtherCAT LinuxCNC runtime target derived from the board-proven phase0 BUS5 chain.
# Feedback path: lcec actual-position -> cia402 pos-fb -> joint motor-pos-fb -> LinuxCNC stat -> v5 SHM display projection.

[EMC]
MACHINE = v5-bus-ethercat
VERSION = 1.1
DEBUG = 0

[DISPLAY]
DISPLAY = linuxcncrsh --port 5007 --name V5_LINUXCNCRSH --connectpw EMC --enablepw EMCTOO --path /opt/8ax/v5/linuxcnc/nc
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2
MIN_LINEAR_VELOCITY = 0
DEFAULT_LINEAR_VELOCITY = 166.666666667
MAX_LINEAR_VELOCITY = 166.666666667
DEFAULT_ANGULAR_VELOCITY = 833.333333333
MAX_ANGULAR_VELOCITY = 833.333333333
INTRO_GRAPHIC =
PROGRAM_PREFIX = /opt/8ax/v5/linuxcnc/nc
MIN_SPINDLE_OVERRIDE = 0
MAX_SPINDLE_OVERRIDE = 2
T0_TOOL_HOLDER_LENGTH_MM = 15

[FILTER]
PROGRAM_EXTENSION = .ngc G-code

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = /opt/8ax/v5/linuxcnc/var/linuxcnc.var
SUBROUTINE_PATH = /opt/8ax/v5/linuxcnc/nc:/usr/share/linuxcnc/ncfiles
USER_M_PATH = /opt/8ax/v5/linuxcnc/nc
HAL_PIN_VARS = 1
RS274NGC_STARTUP_CODE = G21 G17 G40 G49 G54 G64 P0.01 G80 G90 G94 G97

[EMCMOT]
EMCMOT = motmod
TPMOD = tpmod
HOMEMOD = homemod
COMM_TIMEOUT = 1.0
COMM_WAIT = 0.010
SERVO_PERIOD = 2000000

[HAL]
HALFILE = /opt/8ax/v5/linuxcnc/hal/v5_bus_2ms.hal

[HALUI]
MDI_COMMAND = G53 G0 Z0

[TRAJ]
COORDINATES = X Y Z A C
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 166.666666667
MAX_LINEAR_VELOCITY = 166.666666667
DEFAULT_ANGULAR_VELOCITY = 833.333333333
MAX_ANGULAR_VELOCITY = 833.333333333
NO_FORCE_HOMING = 1
ARC_BLEND_ENABLE = 1
ARC_BLEND_FALLBACK_ENABLE = 0
ARC_BLEND_OPTIMIZATION_DEPTH = 100
ARC_BLEND_GAP_CYCLES = 4
ARC_BLEND_RAMP_FREQ = 100

[KINS]
KINEMATICS = xyzac-trt-kins coordinates=XYZAC sparm=identityfirst
JOINTS = 5

[RTCP]
DEFAULT_ACTIVE = 0
MODEL = XYZAC_TRT
MOTION_MODEL = AC摇篮
KINS_MODULE = xyzac-trt-kins
KINS_COORDINATES = XYZAC
KINS_PREFIX = xyzac-trt-kins
KINS_TOOL_OFFSET_PIN = xyzac-trt-kins.tool-offset
KINS_X_ROT_POINT_PIN = xyzac-trt-kins.x-rot-point
KINS_Y_ROT_POINT_PIN = xyzac-trt-kins.y-rot-point
KINS_Z_ROT_POINT_PIN = xyzac-trt-kins.z-rot-point
KINS_X_OFFSET_PIN = xyzac-trt-kins.x-offset
KINS_Y_OFFSET_PIN = xyzac-trt-kins.y-offset
KINS_Z_OFFSET_PIN = xyzac-trt-kins.z-offset
WRAPPED_ROTARY_MASK = 40
G53_A_Y = 20
G53_A_Z = -80
G53_B_X = 0
G53_B_Z = -25
G53_C_X = 50
G53_C_Y = 20

[AXIS_B]
TYPE = ANGULAR
DIRECTION_MODE = cw
MAX_VELOCITY = 833.333333333
MAX_ACCELERATION = 2000
MIN_LIMIT = 0
MAX_LIMIT = 0
PITCH = 360
MOTOR_REV = 1
LOAD_REV = 1
SCALE = 1000
WCHECKPOINT_COMMAND_RAW_BITS = 32
WCHECKPOINT_FEEDBACK_RAW_BITS = 32
WCHECKPOINT_COMMAND_RAW_SIGNED = 1
WCHECKPOINT_FEEDBACK_RAW_SIGNED = 1
WCHECKPOINT_COMMAND_MODULUS_HI = 1
WCHECKPOINT_COMMAND_MODULUS_LO = 0
WCHECKPOINT_FEEDBACK_MODULUS_HI = 1
WCHECKPOINT_FEEDBACK_MODULUS_LO = 0
WCHECKPOINT_COUNTS_PER_REV = 360000
WCHECKPOINT_DRIVE_PERIODIC = 0
BACKLASH = 0
HOME = 0
HOME_SEARCH_VEL = 0
HOME_SEQUENCE = 3

[AXIS_GANTRY]
